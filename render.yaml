services:
  - type: web
    name: narrativenexus-ai
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -m spacy download en_core_web_sm
      python -m nltk.downloader punkt stopwords wordnet punkt_tab
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/cache/transformers
      - key: HF_HOME
        value: /opt/render/project/cache/huggingface
    plan: standard
    healthCheckPath: /
    autoDeploy: true
